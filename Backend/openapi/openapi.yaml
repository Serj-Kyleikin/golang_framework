openapi: 3.0.3
info:
  title: Subscriptions Aggregator API
  version: "1.0.0"

servers:
  - url: http://localhost:8080

paths:
  /api/v1/subscriptions:
    post:
      summary: Create subscription
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertSubscription"
            examples:
              without_end_date:
                summary: Open-ended subscription
                value:
                  service_name: "MS"
                  price: 400
                  user_id: "60601fee-2bf1-4721-ae6f-7636e79a0cba"
                  start_date: "07-2025"
              with_end_date:
                summary: Subscription with end date
                value:
                  service_name: "MS"
                  price: 400
                  user_id: "60601fee-2bf1-4721-ae6f-7636e79a0cba"
                  start_date: "07-2025"
                  end_date: "08-2026"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseSubscription"
              example:
                status: true
                message: null
                data:
                  id: "e7769779-5a7a-43a3-97ab-4b1aaeffe812"
                  service_name: "Google"
                  price: 400
                  user_id: "60601fee-2bf1-4721-ae6f-7636e79a0cba"
                  start_date: "07-2025"
        "500":
          $ref: "#/components/responses/InternalError"

    get:
      summary: List subscriptions
      parameters:
        - in: query
          name: user_id
          schema:
            type: string
            format: uuid
        - in: query
          name: service_name
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 200
        - in: query
          name: offset
          schema:
            type: integer
            default: 0
            minimum: 0
      responses:
        "200":
          description: List
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseSubscriptionList"
              example:
                status: true
                message: null
                data:
                  items:
                    - id: "e7769779-5a7a-43a3-97ab-4b1aaeffe812"
                      service_name: "Google"
                      price: 400
                      user_id: "60601fee-2bf1-4721-ae6f-7636e79a0cba"
                      start_date: "07-2025"
                  limit: 50
                  offset: 0
                  count: 1
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/subscriptions/{id}:
    get:
      summary: Get subscription by id
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Subscription
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseSubscription"
              example:
                status: true
                message: null
                data:
                  id: "e7769779-5a7a-43a3-97ab-4b1aaeffe812"
                  service_name: "Google"
                  price: 400
                  user_id: "60601fee-2bf1-4721-ae6f-7636e79a0cba"
                  start_date: "07-2025"
        "500":
          $ref: "#/components/responses/InternalError"

    put:
      summary: Update subscription by id
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertSubscription"
            examples:
              without_end_date:
                summary: Open-ended subscription
                value:
                  service_name: "MS"
                  price: 400
                  user_id: "60601fee-2bf1-4721-ae6f-7636e79a0cba"
                  start_date: "07-2025"
              with_end_date:
                summary: Subscription with end date
                value:
                  service_name: "MS"
                  price: 400
                  user_id: "60601fee-2bf1-4721-ae6f-7636e79a0cba"
                  start_date: "07-2025"
                  end_date: "08-2026"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseSubscription"
              example:
                status: true
                message: null
                data:
                  id: "e7769779-5a7a-43a3-97ab-4b1aaeffe812"
                  service_name: "Google"
                  price: 400
                  user_id: "60601fee-2bf1-4721-ae6f-7636e79a0cba"
                  start_date: "07-2025"
        "500":
          $ref: "#/components/responses/InternalError"

    delete:
      summary: Delete subscription by id
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseMessage"
              example:
                status: true
                message: "Deleted"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/subscriptions/total:
    get:
      summary: Total subscription cost for period (monthly overlap)
      parameters:
        - in: query
          name: from
          required: true
          schema:
            $ref: "#/components/schemas/MonthYear"
          example: "07-2025"
        - in: query
          name: to
          required: true
          schema:
            $ref: "#/components/schemas/MonthYear"
          example: "09-2025"
        - in: query
          name: user_id
          schema:
            type: string
            format: uuid
        - in: query
          name: service_name
          schema:
            type: string
      responses:
        "200":
          description: Total
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponseTotal"
              example:
                status: true
                message: null
                data:
                  total: 1300
        "500":
          $ref: "#/components/responses/InternalError"

components:
  schemas:
    MonthYear:
      type: string
      description: "MM-YYYY"
      example: "07-2025"
      pattern: "^(0[1-9]|1[0-2])-[0-9]{4}$"

    UpsertSubscription:
      type: object
      required: [service_name, price, user_id, start_date]
      properties:
        service_name:
          type: string
        price:
          type: integer
          minimum: 0
        user_id:
          type: string
          format: uuid
        start_date:
          $ref: "#/components/schemas/MonthYear"
        end_date:
          allOf:
            - $ref: "#/components/schemas/MonthYear"
          nullable: true
          description: "Optional. If omitted or null, subscription is considered active/open-ended."

    Subscription:
      type: object
      required: [id, service_name, price, user_id, start_date]
      properties:
        id:
          type: string
          format: uuid
        service_name:
          type: string
        price:
          type: integer
          minimum: 0
        user_id:
          type: string
          format: uuid
        start_date:
          $ref: "#/components/schemas/MonthYear"
        end_date:
          allOf:
            - $ref: "#/components/schemas/MonthYear"
          nullable: true
          description: "Optional. Present only if subscription has an end date."

    SubscriptionList:
      type: object
      required: [items, limit, offset, count]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Subscription"
        limit:
          type: integer
          example: 50
        offset:
          type: integer
          example: 0
        count:
          type: integer
          example: 1

    Total:
      type: object
      required: [total]
      properties:
        total:
          type: integer
          format: int64
          example: 1300

    ApiResponseSubscription:
      type: object
      required: [status, message, data]
      properties:
        status:
          type: boolean
          example: true
        message:
          type: string
          nullable: true
          example: null
        data:
          $ref: "#/components/schemas/Subscription"

    ApiResponseSubscriptionList:
      type: object
      required: [status, message, data]
      properties:
        status:
          type: boolean
          example: true
        message:
          type: string
          nullable: true
          example: null
        data:
          $ref: "#/components/schemas/SubscriptionList"

    ApiResponseTotal:
      type: object
      required: [status, message, data]
      properties:
        status:
          type: boolean
          example: true
        message:
          type: string
          nullable: true
          example: null
        data:
          $ref: "#/components/schemas/Total"

    ApiResponseMessage:
      type: object
      required: [status, message]
      properties:
        status:
          type: boolean
          example: true
        message:
          type: string
          example: "Deleted"

    ErrorInternal:
      type: object
      properties:
        status:
          type: boolean
          example: false
        message:
          type: string
          example: "Internal server Error"

  responses:
    InternalError:
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorInternal"