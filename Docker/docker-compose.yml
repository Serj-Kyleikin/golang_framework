x-gateway-certs: &gateway-certs
  CERT_PATH: "${WORKDIR}/${CERTS_DIR}/${CERT_NAME}"
  KEY_PATH: "${WORKDIR}/${CERTS_DIR}/${CERT_KEY}"

services:
  gateway:
    build:
      context: .
      dockerfile: Docker/Server/Dockerfile
    ports:
      - "${GATEWAY_EXT_PORT}:${GATEWAY_INT_PORT}"
    env_file:
      - .env
    environment:
      GATEWAY_INT_PORT: "${GATEWAY_INT_PORT}"
      API_BACKENDS: "${API_BACKEND_1},${API_BACKEND_2}"
      <<: *gateway-certs
    volumes:
      - "${CERTS_HOST_PATH}:${WORKDIR}/${CERTS_DIR}:ro"
    depends_on:
      - backend1
      - backend2
      - db
    networks:
      - app-network

  backend1:
    build:
      context: .
      dockerfile: Docker/Backend/Dockerfile
    env_file:
      - .env
    environment:
      HTTP_ADDR: ":${BACKEND1_APP_PORT}"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "${BACKEND1_APP_PORT}:${BACKEND1_APP_PORT}"
    networks:
      - app-network

  backend2:
    build:
      context: .
      dockerfile: Docker/Backend/Dockerfile
    env_file:
      - .env
    environment:
      HTTP_ADDR: ":${BACKEND2_APP_PORT}"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - app-network

  swagger:
    image: swaggerapi/swagger-ui:v5.17.14
    depends_on:
      - backend1
    environment:
      URL: "http://localhost:${BACKEND1_APP_PORT}/openapi.yaml"
    ports:
      - "${SWAGGER_EXT_PORT}:8080"
    networks:
      - app-network

  db:
    image: postgres:16
    ports:
      - "${DB_EXT_PORT}:${DB_INT_PORT}"
    env_file:
      - .env
    environment:
      POSTGRES_USER: "${DB_USER}"
      POSTGRES_PASSWORD: "${DB_PASS}"
      POSTGRES_DB: "${DB_NAME}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME} -h localhost -p ${DB_INT_PORT}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - app-network

  pgadmin:
    image: dpage/pgadmin4:8
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "${PGADMIN_EXT_PORT}:80"
    env_file:
      - .env
    environment:
      PGADMIN_DEFAULT_EMAIL: "${PGADMIN_DEFAULT_EMAIL}"
      PGADMIN_DEFAULT_PASSWORD: "${PGADMIN_DEFAULT_PASSWORD}"
    networks:
      - app-network

  migrate:
    image: migrate/migrate:v4.17.1
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ${ROOT}${MIGRATIONS_DIR}:/migrations:ro
    command: ["-path", "/migrations", "-database", "${DB_URL}", "up"]
    restart: "no"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge